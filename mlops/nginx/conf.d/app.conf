# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name _;                          # CHANGEME: впиши своё доменное имя

    # TLS-сертификаты (самоподписанные для теста или Let's Encrypt для прода)
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Токен для защиты эндпоинта (задаётся в NGINX_TOKEN в .env.prod)
    # Раскомментировать чтобы включить токен-аутентификацию:
    # if ($http_x_api_token != "YOUR_SECRET_TOKEN") {
    #     return 403;
    # }

    # Проксируем /chat → FastAPI /api/v1/chat
    location /chat {
        proxy_pass         http://chatbot:32000/api/v1/chat;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Прямой доступ ко всем остальным эндпоинтам FastAPI
    location / {
        proxy_pass         http://chatbot:32000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
