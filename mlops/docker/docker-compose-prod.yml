version: '3.8'

# Продакшен / VM-деплой.
#
# Предполагается что на сервере уже лежит .env.prod:
#   scp .env.prod user@vm:/opt/rag-chatbot/.env.prod
#
# Деплой:
#   scp mlops/docker/docker-compose-prod.yml user@vm:/opt/rag-chatbot/docker-compose-prod.yml
#   ssh user@vm "cd /opt/rag-chatbot && docker compose -f docker-compose-prod.yml pull && docker compose -f docker-compose-prod.yml up -d"
#
# Проверка:
#   ssh user@vm "docker compose -f /opt/rag-chatbot/docker-compose-prod.yml ps"

services:

  # ── Бот ────────────────────────────────────────────────────────────────────
  chatbot:
    image: rag-chatbot:latest             # собрать заранее и запушить в registry
    container_name: rag-chatbot
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.0"
    expose:
      - "32000"                            # снаружи открываем только через nginx
    env_file:
      - /opt/rag-chatbot/.env.prod
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "32000"
      PG_HOST: postgres
      REDIS_HOST: redis
      CHROMA_HOST: chromadb
      LOG_PATH: /opt/app-root/logs
      METRIC_PATH: /opt/app-root/logs
      AUDIT_LOG_PATH: /opt/app-root/logs
    volumes:
      - /opt/rag-chatbot/logs:/opt/app-root/logs   # логи на хосте для удобства
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - app-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    mem_limit: 1g
    cpus: "0.5"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  # ── ChromaDB ────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:1.5.2
    container_name: rag-chroma
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.0"
    expose:
      - "8000"
    volumes:
      - chroma_data:/data
    networks:
      - app-network

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: "1.0"
    expose:
      - "5432"
    environment:
      POSTGRES_USER: rag_chatbot
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password   # читаем пароль из Docker secret
      POSTGRES_DB: rag_chatbot_db
    secrets:
      - pg_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_chatbot -d rag_chatbot_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  # ── Nginx (reverse proxy + TLS) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: rag-nginx
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/rag-chatbot/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/rag-chatbot/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/rag-chatbot/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - chatbot
    networks:
      - app-network

secrets:
  pg_password:
    file: /opt/rag-chatbot/secrets/pg_password.txt   # echo -n "yourpassword" > /opt/rag-chatbot/secrets/pg_password.txt

volumes:
  redis_data:
  chroma_data:
  pg_data:

networks:
  app-network:
    driver: bridge
